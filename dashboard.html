<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🥷 NinjaPrice Dashboard</title>
    
    <!-- Favicon do NinjaPrice -->
    <link rel="icon" type="image/png" href="assets/icon.png" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js para os gráficos de histórico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ninja: "#00C853",
              dark: "#121212",
              darker: "#0a0a0a",
              card: "#1e1e1e",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0a0a0a;
        color: #e5e5e5;
      }
      .ninja-glow {
        box-shadow: 0 0 15px rgba(0, 200, 83, 0.1);
      }
      /* Remove contornos do canvas do Chart.js */
      canvas { outline: none; }
    </style>
  </head>
  <body class="min-h-screen p-6 md:p-12">
    <!-- Header -->
    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 border-b border-gray-800 pb-6">
      <div class="flex items-center gap-3">
        <div class="bg-ninja text-black p-3 rounded-xl">
          <i data-lucide="swords" class="w-8 h-8"></i>
        </div>
        <div>
          <h1 class="text-3xl font-bold text-white tracking-tight">NinjaPrice</h1>
          <p class="text-gray-400 text-sm">Dashboard de Monitorização</p>
        </div>
      </div>
      <div class="mt-4 md:mt-0 flex gap-4">
        <div class="bg-card px-4 py-2 rounded-lg border border-gray-800 text-center">
          <span class="block text-xs text-gray-400 uppercase tracking-wider">Itens Rastreados</span>
          <span id="total-items" class="text-xl font-bold text-ninja">0</span>
        </div>
      </div>
    </header>

    <!-- Grid de Produtos -->
    <main class="max-w-6xl mx-auto">
      <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Os cards serão injetados aqui pelo JavaScript -->
      </div>
    </main>

    <script>
      // ---------------------------------------------------------
      // FUNÇÕES UTILITÁRIAS
      // ---------------------------------------------------------
      const formatMoney = (value) => {
        if (value === undefined || value === null) return "---";
        return new Intl.NumberFormat("pt-PT", {
          style: "currency",
          currency: "EUR",
        }).format(value);
      };

      // ---------------------------------------------------------
      // AÇÕES DA API (Editar Alvo e Apagar)
      // ---------------------------------------------------------
      
      async function editTargetPrice(id, currentTarget) {
        const newTarget = prompt(`Novo preço alvo para este item (€):`, currentTarget || 0);
        if (newTarget === null) return; // Utilizador cancelou
        
        const parsedTarget = parseFloat(newTarget.replace(',', '.'));
        if (isNaN(parsedTarget)) {
            alert("Por favor, introduza um número válido.");
            return;
        }

        try {
            // Chamada PATCH para a sua API Go atualizar o config.json
            const res = await fetch(`/items?id=${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_price: parsedTarget })
            });
            
            if(res.ok) {
                loadDashboard(); // Recarrega os dados visuais sem cache
            } else {
                const text = await res.text();
                alert("Erro ao atualizar o preço alvo: " + text);
            }
        } catch(e) {
            alert("Erro de conexão ao servidor NinjaPrice.");
        }
      }

      async function deleteItem(id, name) {
        if (!confirm(`Tem a certeza que deseja remover "${name}" do rastreamento?`)) return;

        try {
            // Chamada DELETE para a sua API Go apagar do config.json
            const res = await fetch(`/items?id=${id}`, { method: 'DELETE' });
            
            if(res.ok) {
                loadDashboard(); // Recarrega os dados visuais sem cache
            } else {
                const text = await res.text();
                alert("Erro ao remover o item: " + text);
            }
        } catch(e) {
            alert("Erro de conexão ao servidor NinjaPrice.");
        }
      }

      // ---------------------------------------------------------
      // RENDERIZAÇÃO E GRÁFICOS
      // ---------------------------------------------------------

      async function loadDashboard() {
        try {
          // Usamos cache: 'no-store' e um timestamp dinâmico para forçar o browser 
          // a ignorar totalmente o cache local em cada chamada
          const timestamp = new Date().getTime();
          const fetchOptions = { cache: "no-store" };

          const [histRes, confRes] = await Promise.all([
            fetch(`/history?t=${timestamp}`, fetchOptions),
            fetch(`/config?t=${timestamp}`, fetchOptions),
          ]);

          const history = await histRes.json();
          const config = await confRes.json();

          const historyItems = history.items || history;
          const configItems = config.items || config;

          const grid = document.getElementById("products-grid");
          grid.innerHTML = "";
          document.getElementById("total-items").innerText = configItems.length;

          configItems.forEach((item) => {
            const hist = historyItems[item.id] || {};
            const price = hist.last_price || hist.price || 0;
            const dateStr = hist.last_checked || hist.date || "---";
            const target = item.target_price || 0;

            const card = document.createElement("div");
            card.className = "bg-card border border-gray-800 rounded-2xl p-6 hover:border-ninja transition-colors duration-300 ninja-glow flex flex-col justify-between relative";

            card.innerHTML = `
                <div>
                    <!-- Topo: Categoria e Botões de Ação -->
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-semibold px-3 py-1 bg-gray-800 text-gray-300 rounded-full">
                            ${item.category || "Monitoramento"}
                        </span>
                        <div class="flex gap-3 text-gray-500">
                            <button onclick="editTargetPrice('${item.id}', ${target})" class="hover:text-ninja transition-colors" title="Editar Preço Alvo">
                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteItem('${item.id}', '${item.name.replace(/'/g, "\\'")}')" class="hover:text-red-500 transition-colors" title="Remover Produto">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Informações do Produto -->
                    <h3 class="text-lg font-medium text-white mb-4 line-clamp-2" title="${item.name}">${item.name}</h3>
                    
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <span class="text-sm text-gray-400 block mb-1">Preço Atual</span>
                            <span class="text-4xl font-bold text-white">${formatMoney(price)}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-xs text-gray-500 block mb-1">Preço Alvo</span>
                            <span class="text-sm font-semibold text-ninja">${formatMoney(target)}</span>
                        </div>
                    </div>
                </div>

                <!-- Gráfico Chart.js em miniatura -->
                <div class="w-full h-16 mb-4 mt-2">
                    <canvas id="chart-${item.id}"></canvas>
                </div>
                
                <!-- Rodapé: Data e Link -->
                <div class="pt-4 border-t border-gray-800 flex justify-between items-center">
                    <div class="text-xs text-gray-500 flex items-center gap-1">
                        <i data-lucide="clock" class="w-3 h-3"></i>
                        ${dateStr.split("T")[0].split(" ")[0]}
                    </div>
                    <a href="${item.url}" target="_blank" class="text-ninja hover:text-white transition-colors flex items-center gap-1 text-sm font-medium">
                        Loja <i data-lucide="external-link" class="w-4 h-4"></i>
                    </a>
                </div>
            `;
            grid.appendChild(card);

            let chartData = hist.history || []; 
            let labels = [];
            let prices = [];

            if (chartData.length > 0) {
                // Lê os dados reais enviados pelo Go
                labels = chartData.map(d => d.date);
                prices = chartData.map(d => d.price);
                
                // Se só tivermos 1 ponto (primeiro rastreio), duplicamos para formar uma linha visual
                if (chartData.length === 1) {
                    labels.unshift("Início");
                    prices.unshift(chartData[0].price);
                }
            } else if (price > 0) {
                // Fallback caso o histórico ainda não tenha o array gerado
                labels = ["Hoje", "Hoje"];
                prices = [price, price];
            }

            const ctx = document.getElementById(`chart-${item.id}`).getContext('2d');
            
            let gradient = ctx.createLinearGradient(0, 0, 0, 64);
            gradient.addColorStop(0, 'rgba(0, 200, 83, 0.4)');
            gradient.addColorStop(1, 'rgba(0, 200, 83, 0.0)');

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: prices,
                        borderColor: '#00C853',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: true } },
                    scales: {
                        x: { display: false },
                        y: { display: false, min: Math.min(...prices) * 0.95 }
                    },
                    interaction: { mode: 'index', intersect: false }
                }
            });
          });

          lucide.createIcons();
        } catch (error) {
          console.error("Erro ao carregar dados:", error);
          document.getElementById("products-grid").innerHTML =
            '<p class="text-red-500 text-center col-span-full py-10">Erro ao carregar dados. Verifique se o backend do NinjaPrice está a correr na mesma porta.</p>';
        }
      }

      loadDashboard();
    </script>
  </body>
</html>
