<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🥷 NinjaPrice Dashboard</title>
    <!-- Usamos o Tailwind CSS via CDN para um design moderno sem ficheiros extra -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para os ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ninja: "#00C853",
              dark: "#121212",
              darker: "#0a0a0a",
              card: "#1e1e1e",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0a0a0a;
        color: #e5e5e5;
      }
      .ninja-glow {
        box-shadow: 0 0 15px rgba(0, 200, 83, 0.1);
      }
    </style>
  </head>
  <body class="min-h-screen p-6 md:p-12">
    <!-- Header -->
    <header
      class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 border-b border-gray-800 pb-6"
    >
      <div class="flex items-center gap-3">
        <div class="bg-ninja text-black p-3 rounded-xl">
          <i data-lucide="swords" class="w-8 h-8"></i>
        </div>
        <div>
          <h1 class="text-3xl font-bold text-white tracking-tight">
            NinjaPrice
          </h1>
          <p class="text-gray-400 text-sm">Dashboard de Monitorização</p>
        </div>
      </div>
      <div class="mt-4 md:mt-0 flex gap-4">
        <div
          class="bg-card px-4 py-2 rounded-lg border border-gray-800 text-center"
        >
          <span class="block text-xs text-gray-400 uppercase tracking-wider"
            >Itens Rastreados</span
          >
          <span id="total-items" class="text-xl font-bold text-ninja">0</span>
        </div>
      </div>
    </header>

    <!-- Grid de Produtos -->
    <main class="max-w-6xl mx-auto">
      <div
        id="products-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <!-- Os cards serão injetados aqui pelo JavaScript -->
      </div>
    </main>

    <script>
      // Inicializa os ícones
      lucide.createIcons();

      // Dados de exemplo (Mock) para o Preview.
      // No seu projeto real, o fetch() abaixo vai buscar os dados verdadeiros!
      const mockData = {
        asus_oled_dm: {
          name: "Monitor Asus ROG Strix OLED XG27AQDMG",
          category: "Monitor",
          price: 476.0,
          date: "2026-06-20 15:04:05",
          url: "https://pccomponentes.pt",
        },
        logitech_mx_master: {
          name: "Rato Logitech MX Master 3S",
          category: "Periféricos",
          price: 89.9,
          date: "2026-06-20 15:04:05",
          url: "https://pcdiga.pt",
        },
        ps5_pro: {
          name: "Consola PlayStation 5 Pro",
          category: "Gaming",
          price: 699.99,
          date: "2026-06-20 14:30:00",
          url: "https://amazon.es",
        },
      };

      // Função para formatar moeda
      const formatMoney = (value) => {
        if (!value) return "---";
        return new Intl.NumberFormat("pt-PT", {
          style: "currency",
          currency: "EUR",
        }).format(value);
      };

      // Função para renderizar os cards
      async function loadDashboard() {
        try {
          // 1. Busca os dois ficheiros simultaneamente
          const [histRes, confRes] = await Promise.all([
            fetch("/history"),
            fetch("/config"),
          ]);

          const history = await histRes.json();
          const config = await confRes.json();

          // Extrai os itens (ajuste conforme a estrutura do seu JSON)
          const historyItems = history.items || history;
          const configItems = config.items || config;

          const grid = document.getElementById("products-grid");
          const totalItems = document.getElementById("total-items");

          grid.innerHTML = "";
          totalItems.innerText = configItems.length;

          // 2. Faz o Join e Renderiza
          configItems.forEach((item) => {
            // Procura o histórico pelo ID que está no config
            const hist = historyItems[item.id] || {};

            const price = hist.last_price || 0;
            const dateStr = hist.last_checked || "---";

            const card = document.createElement("div");
            card.className =
              "bg-card border border-gray-800 rounded-2xl p-6 hover:border-ninja transition-colors duration-300 ninja-glow flex flex-col justify-between";

            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-semibold px-3 py-1 bg-gray-800 text-gray-300 rounded-full">
                            ${item.category || "Monitoramento"}
                        </span>
                    </div>
                    <h3 class="text-lg font-medium text-white mb-6 line-clamp-2" title="${item.name}">${item.name}</h3>
                    
                    <div class="mb-6">
                        <span class="text-sm text-gray-400 block mb-1">Último Preço Visto</span>
                        <span class="text-4xl font-bold text-white">${formatMoney(price)}</span>
                    </div>
                </div>
                
                <div class="pt-4 border-t border-gray-800 flex justify-between items-center">
                    <div class="text-xs text-gray-500 flex items-center gap-1">
                        <i data-lucide="clock" class="w-3 h-3"></i>
                        ${dateStr.split("T")[0]}
                    </div>
                    <a href="${item.url}" target="_blank" class="text-ninja hover:text-white transition-colors flex items-center gap-1 text-sm font-medium">
                        Ver na Loja <i data-lucide="external-link" class="w-4 h-4"></i>
                    </a>
                </div>
            `;
            grid.appendChild(card);
          });
          lucide.createIcons();
        } catch (error) {
          console.error("Erro ao carregar dados:", error);
          document.getElementById("products-grid").innerHTML =
            '<p class="text-red-500 text-center col-span-full">Erro ao carregar dados. Verifique se o Go está a rodar as rotas /history e /config.</p>';
        }
      }

      loadDashboard();
    </script>
  </body>
</html>
