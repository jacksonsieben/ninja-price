<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>NinjaPrice</title>
    <style>
      body {
        font-family: sans-serif;
        width: 300px;
        margin: 0;
        padding: 16px;
        color: #333;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px 0;
        color: #00c853;
      }
      #status {
        font-size: 13px;
        color: #555;
        margin-bottom: 12px;
        min-height: 16px;
      }
      label {
        display: block;
        margin-top: 10px;
        font-size: 12px;
        font-weight: bold;
      }
      input, select {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 6px;
        margin-top: 4px;
        font-size: 13px;
        font-family: inherit;
        background: white;
      }
      #price-info {
        font-size: 12px;
        color: #777;
        margin-top: 10px;
      }
      button {
        width: 100%;
        margin-top: 16px;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #00c853;
        color: white;
        font-weight: bold;
        cursor: pointer;
        font-size: 13px;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      #pick-btn, #find-elsewhere-btn {
        background: #f0f2f5;
        color: #555;
      }
      .mode-switch {
        display: flex;
        gap: 6px;
        margin-top: 10px;
      }
      .mode-switch button {
        margin-top: 0;
        padding: 8px;
        font-size: 12px;
        background: #f0f2f5;
        color: #555;
      }
      .mode-switch button.active {
        background: #00c853;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>🥷 NinjaPrice</h1>
    <div id="status">A abrir...</div>

    <div id="item-form" hidden>
      <div class="mode-switch">
        <button type="button" id="mode-new-btn" class="active">Novo Produto</button>
        <button type="button" id="mode-existing-btn">Produto Existente</button>
      </div>

      <div id="new-fields">
        <label for="name">Nome do Produto:</label>
        <input id="name" type="text" />

        <label for="category">Categoria:</label>
        <input id="category" type="text" placeholder="Ex: Periféricos" />

        <label for="target">Avisar quando for menor que (€):</label>
        <input id="target" type="number" step="0.01" placeholder="Ex: 350.00" />
      </div>

      <div id="existing-fields" hidden>
        <label for="existing-select">Associar a:</label>
        <select id="existing-select">
          <option value="">A carregar produtos...</option>
        </select>
      </div>

      <div id="price-info"></div>

      <button id="save-btn">Salvar</button>
    </div>

    <button id="pick-btn" hidden>Escolher preço na página</button>
    <button id="find-elsewhere-btn" hidden>Encontrar noutras lojas</button>

    <script src="popup.js"></script>
  </body>
</html>
